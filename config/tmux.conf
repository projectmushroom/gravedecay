# tmux config for the agent server (used via: tmux -L agents -f /srv/dev/config/tmux.conf)
# Loaded automatically by grave and the `agents` alias.

set -g history-limit 100000          # agents produce a lot of scrollback
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# Clipboard from the browser terminal. `mouse on` means a plain drag is a tmux
# copy-mode selection, not a browser selection — so without this it never
# reaches the system clipboard. set-clipboard + the Ms override make tmux emit
# OSC 52 on copy; ttyd/xterm.js (over HTTPS = a secure context) writes it to
# the real clipboard. Mouse-drag, then it's on your clipboard. Fallback that
# always works: hold Shift while dragging to select natively in the browser,
# then Cmd/Ctrl+C.
set -g set-clipboard on
set -ga terminal-overrides ",*:Ms=\\E]52;%p1%s;%p2%s\\7"
# copy the mouse selection to the clipboard without clearing it or jumping to
# the bottom — so you can see what you grabbed
bind -T copy-mode    MouseDragEnd1Pane send -X copy-selection-no-clear
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear
set -g escape-time 10
set -g focus-events on
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S:#W — agents"

# Status bar: session name + window list + host
set -g status-style "bg=colour235,fg=colour250"
set -g status-left "#[bold] #S "
set -g status-right " %H:%M "

# Never kill sessions on detach/disconnect (persistence is the whole point)
set -g detach-on-destroy off
set -g exit-empty off

# Wake the human (docs/NOTIFICATIONS.md): a closed session or a bell (agent
# CLIs ring one when they finish or wait on a prompt) reaches `grave notify`,
# which is a silent no-op unless a channel is configured AND the event class is
# enabled in NOTIFY_EVENTS. #{q:...} shell-quotes the name — sessions on this
# shared socket are not all charset-validated (T3/webterm create their own), so
# never interpolate a name into sh bare. Existing boxes: raise.sh won't clobber
# your tmux.conf — re-copy it from the repo to pick these hooks up.
set-hook -ga session-closed 'run-shell -b "grave notify --event session-exit \"agent session ended\" #{q:hook_session_name} on #h >/dev/null 2>&1 || true"'
set-hook -ga alert-bell     'run-shell -b "grave notify --event bell \"agent needs attention\" #{q:session_name} on #h >/dev/null 2>&1 || true"'
