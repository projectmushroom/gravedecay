# tmux config for the agent server (used via: tmux -L agents -f /srv/dev/config/tmux.conf)
# Loaded automatically by grave and the `agents` alias.

set -g history-limit 100000          # agents produce a lot of scrollback
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g escape-time 10
set -g focus-events on
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S:#W — agents"

# Status bar: session name + window list + host
set -g status-style "bg=colour235,fg=colour250"
set -g status-left "#[bold] #S "
set -g status-right " %H:%M "

# Never kill sessions on detach/disconnect (persistence is the whole point)
set -g detach-on-destroy off
set -g exit-empty off
